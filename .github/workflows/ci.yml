name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: $HOME/.local/bin/uv sync --extra dev
      - name: Lint
        run: $HOME/.local/bin/uv run ruff check .
      - name: Test
        run: $HOME/.local/bin/uv run pytest -q
